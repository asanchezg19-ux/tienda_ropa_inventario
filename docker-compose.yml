# ─────────────────────────────────────────────
#  RED ÚNICA: comunicación entre servicios
# ─────────────────────────────────────────────
networks:
  tienda-net:
    driver: bridge

# ─────────────────────────────────────────────
#  VOLÚMENES PERSISTENTES
# ─────────────────────────────────────────────
volumes:
  postgres-data:       # Datos de SonarQube
  sonar-data:          # Configuración de SonarQube
  prometheus-data:     # Métricas históricas
  grafana-data:        # Dashboards y configuración
  loki-data:           # Logs almacenados
  backend-data:        # Datos JSON de la tienda (inventario, ventas)

# ─────────────────────────────────────────────
#  SERVICIOS
# ─────────────────────────────────────────────
services:

  # ── BASE DE DATOS (SonarQube) ────
  postgres:
    image: postgres:15-alpine
    container_name: tienda-postgres
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tienda-net
    mem_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ANÁLISIS DE CALIDAD ─────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: tienda-sonar
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_CE_JAVAOPTS: "-Xmx256m"
      SONAR_WEB_JAVAOPTS: "-Xmx256m"
    volumes:
      - sonar-data:/opt/sonarqube/data
    ports:
      - "9000:9000"
    networks:
      - tienda-net
    mem_limit: 768m
    restart: unless-stopped

  # ── ALMACÉN DE LOGS ─────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: tienda-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - tienda-net
    mem_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RECOLECTOR DE LOGS ──────────────────────
  alloy:
    image: grafana/alloy:v1.3.1
    container_name: tienda-alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "12345:12345"
    networks:
      - tienda-net
    mem_limit: 128m
    restart: unless-stopped

  # ── BACKEND (API REST) ──────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: tienda-backend
    environment:
      NODE_ENV: production
      PERSISTENCE_MODE: local
      PORT: 4000
      JWT_SECRET: tienda_ropa_secret_2026
      STOCK_MINIMO: 3
    volumes:
      - backend-data:/app/data
    ports:
      - "4000:4000"
    networks:
      - tienda-net
    mem_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4000/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      logging: "promtail"
      app: "tienda-backend"

  # ── FRONTEND (interfaz web) ─────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: tienda-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: https://amazonaws.com
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - tienda-net
    mem_limit: 128m
    restart: unless-stopped
    labels:
      logging: "promtail"
      app: "tienda-frontend"

  # ── RECOLECTOR DE MÉTRICAS ──────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: tienda-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alertas.yml:/etc/prometheus/alertas.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - tienda-net
    mem_limit: 256m
    restart: unless-stopped

  # ── VISUALIZACIÓN ───────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: tienda-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: warn
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - tienda-net
    mem_limit: 256m
    restart: unless-stopped
