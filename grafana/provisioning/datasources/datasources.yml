# ═══════════════════════════════════════════════════════════════
#  GRAFANA — PROVISIONING DE FUENTES DE DATOS
#  Sistema de Gestión de Inventario — Tienda de Ropa Local
# ═══════════════════════════════════════════════════════════════
apiVersion: 1

datasources:

  # ── PROMETHEUS — métricas del backend ─────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus-uid
    # Nombre de servicio Docker 
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      # Intervalo mínimo de consulta 
      timeInterval: "15s"
      # Habilitar ejemplares para trazas 

  # ── LOKI — logs estructurados del backend ─────────────────
  - name: Loki
    type: loki
    uid: loki-uid
    # Nombre de servicio Docker
    url: http://loki:3100
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      # Límite de líneas por consulta 
      maxLines: 1000

