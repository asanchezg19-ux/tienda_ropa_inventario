service: tienda-ropa-backend

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  deploymentMethod: direct
  logRetentionInDays: 180 # RNF-12: retencion explicita, minimo 90 dias exigidos
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:us-east-1:*:table/InventarioTienda
            - arn:aws:dynamodb:us-east-1:*:table/VentasTienda
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - arn:aws:s3:::tienda-ropa-imagenes-${aws:accountId}/*
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - arn:aws:sqs:us-east-1:${aws:accountId}:tienda-ropa-ventas-pendientes
            - arn:aws:sqs:us-east-1:${aws:accountId}:tienda-ropa-ventas-dlq
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - arn:aws:sns:us-east-1:${aws:accountId}:tienda-ropa-alerta-stock
  environment:
    PERSISTENCE_MODE: cloud
    JWT_SECRET: tienda_ropa_secret_2026
    STOCK_MINIMO: 3
    BUCKET_IMAGENES: tienda-ropa-imagenes-${aws:accountId}
    QUEUE_VENTAS_URL: https://sqs.us-east-1.amazonaws.com/${aws:accountId}/tienda-ropa-ventas-pendientes
    TOPIC_ALERTA_STOCK_ARN: arn:aws:sns:us-east-1:${aws:accountId}:tienda-ropa-alerta-stock

functions:
  api:
    handler: server.handler
    memorySize: 512
    timeout: 10
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+}
          method: any
          cors: true

  procesarColaVentas:
    handler: server.procesarColaVentas
    memorySize: 512
    timeout: 15
    events:
      - sqs:
          arn:
            Fn::GetAtt: [ColaVentasPendientes, Arn]
          batchSize: 1

package:
  individually: true
  patterns:
    - '!node_modules/nodemon/**'

resources:
  Resources:
    BucketImagenes:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: tienda-ropa-imagenes-${aws:accountId}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ['*']
              AllowedMethods: [GET]
              AllowedHeaders: ['*']
    BucketImagenesPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref BucketImagenes
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub '${BucketImagenes.Arn}/*'

    # RNF-05: si una venta no se puede guardar, se encola aquí en vez de perderse.
    # Tras 3 intentos fallidos (maxReceiveCount), SQS la mueve sola a la DLQ.
    ColaVentasDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: tienda-ropa-ventas-dlq
        MessageRetentionPeriod: 1209600 # 14 días, tiempo máximo para revisar manualmente

    ColaVentasPendientes:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: tienda-ropa-ventas-pendientes
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt ColaVentasDLQ.Arn
          maxReceiveCount: 3

    # RNF-10: aviso al dueño cuando un producto queda en stock crítico.
    # SNS entrega el correo en segundos, muy por debajo del límite de 60s.
    TopicoAlertaStock:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: tienda-ropa-alerta-stock

    SuscripcionCorreoAlertaStock:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: !Ref TopicoAlertaStock
        Protocol: email
        Endpoint: anacrissanchezguzman@gmail.com

    # RNF-01 / RNF-02: si el backend falla o responde lento, aviso automático
    # por el mismo correo (reusa el tema de SNS ya confirmado).
    AlarmaErroresBackend:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: tienda-ropa-backend-errores
        AlarmDescription: "Más de 3 errores del backend en 5 minutos (RNF-01)"
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: !Ref ApiLambdaFunction
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 3
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - !Ref TopicoAlertaStock

    AlarmaLatenciaBackend:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: tienda-ropa-backend-lentitud
        AlarmDescription: "Tiempo de respuesta promedio del backend supera los 3s del RNF-02"
        Namespace: AWS/Lambda
        MetricName: Duration
        Dimensions:
          - Name: FunctionName
            Value: !Ref ApiLambdaFunction
        Statistic: Average
        Period: 300
        EvaluationPeriods: 1
        Threshold: 3000
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - !Ref TopicoAlertaStock

    AlarmaColaErroresVentas:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: tienda-ropa-ventas-dlq-con-mensajes
        AlarmDescription: "Una venta fallo 3 veces y cayo en la DLQ, requiere revision manual (RNF-05 / RNF-01)"
        Namespace: AWS/SQS
        MetricName: ApproximateNumberOfMessagesVisible
        Dimensions:
          - Name: QueueName
            Value: !GetAtt ColaVentasDLQ.QueueName
        Statistic: Maximum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - !Ref TopicoAlertaStock