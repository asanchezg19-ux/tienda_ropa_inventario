service: tienda-ropa-backend

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1 
  deploymentMethod: direct 
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:us-east-1:*:table/InventarioTienda
            - arn:aws:dynamodb:us-east-1:*:table/VentasTienda
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - arn:aws:s3:::tienda-ropa-imagenes-${aws:accountId}/*
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - arn:aws:sqs:us-east-1:${aws:accountId}:tienda-ropa-ventas-pendientes
            - arn:aws:sqs:us-east-1:${aws:accountId}:tienda-ropa-ventas-dlq
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - arn:aws:sns:us-east-1:${aws:accountId}:tienda-ropa-alerta-stock
  environment:
    PERSISTENCE_MODE: cloud
    JWT_SECRET: tienda_ropa_secret_2026
    STOCK_MINIMO: 3
    BUCKET_IMAGENES: tienda-ropa-imagenes-${aws:accountId}
    QUEUE_VENTAS_URL: https://sqs.us-east-1.amazonaws.com/${aws:accountId}/tienda-ropa-ventas-pendientes
    TOPIC_ALERTA_STOCK_ARN: arn:aws:sns:us-east-1:${aws:accountId}:tienda-ropa-alerta-stock

functions:
  api:
    handler: server.handler
    memorySize: 512
    timeout: 10
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+}
          method: any
          cors: true

  procesarColaVentas:
    handler: server.procesarColaVentas
    memorySize: 512
    timeout: 15
    events:
      - sqs:
          arn:
            Fn::GetAtt: [ColaVentasPendientes, Arn]
          batchSize: 1

package:
  individually: true
  patterns:
    - '!node_modules/nodemon/**'

resources:
  Resources:
    BucketImagenes:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: tienda-ropa-imagenes-${aws:accountId}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ['*']
              AllowedMethods: [GET]
              AllowedHeaders: ['*']
    BucketImagenesPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref BucketImagenes
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub '${BucketImagenes.Arn}/*'

    # RNF-05: si una venta no se puede guardar, se encola aquí en vez de perderse.
    # Tras 3 intentos fallidos (maxReceiveCount), SQS la mueve sola a la DLQ.
    ColaVentasDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: tienda-ropa-ventas-dlq
        MessageRetentionPeriod: 1209600 # 14 días, tiempo máximo para revisar manualmente

    ColaVentasPendientes:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: tienda-ropa-ventas-pendientes
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt ColaVentasDLQ.Arn
          maxReceiveCount: 3

    # RNF-10: aviso al dueño cuando un producto queda en stock crítico.
    # SNS entrega el correo en segundos, muy por debajo del límite de 60s.
    TopicoAlertaStock:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: tienda-ropa-alerta-stock

    SuscripcionCorreoAlertaStock:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: !Ref TopicoAlertaStock
        Protocol: email
        Endpoint: asanchezg19@upao.edu.pe