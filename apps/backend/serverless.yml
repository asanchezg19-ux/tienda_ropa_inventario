service: tienda-ropa-backend

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1 
  deploymentMethod: direct 
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:us-east-1:*:table/InventarioTienda
            - arn:aws:dynamodb:us-east-1:*:table/VentasTienda
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - arn:aws:s3:::tienda-ropa-imagenes-${aws:accountId}/*
  environment:
    PERSISTENCE_MODE: cloud
    JWT_SECRET: tienda_ropa_secret_2026
    STOCK_MINIMO: 3
    BUCKET_IMAGENES: tienda-ropa-imagenes-${aws:accountId}

functions:
  api:
    handler: server.handler 
    memorySize: 512 
    timeout: 10 
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+} 
          method: any
          cors: true

package:
  individually: true
  patterns:
    - '!node_modules/nodemon/**'

resources:
  Resources:
    BucketImagenes:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: tienda-ropa-imagenes-${aws:accountId}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ['*']
              AllowedMethods: [GET]
              AllowedHeaders: ['*']
    BucketImagenesPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref BucketImagenes
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub '${BucketImagenes.Arn}/*'