# ═══════════════════════════════════════════════════════════════
#  SONARQUBE — CONFIGURACIÓN DE ANÁLISIS ESTÁTICO
#  Sistema de Gestión de Inventario — Tienda de Ropa Local
# ═══════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────
#  IDENTIFICACIÓN DEL PROYECTO
# ─────────────────────────────────────────────
sonar.projectKey=tienda-ropa-inventario
sonar.projectName=Sistema de Gestión de Inventario - Tienda de Ropa Local
sonar.projectVersion=1.0.0

# ─────────────────────────────────────────────
#  CÓDIGO A ANALIZAR
#  Solo el backend donde está la lógica de negocio.
#  El frontend es HTML embebido en un string,
#  no aporta valor de análisis estático.
# ─────────────────────────────────────────────
sonar.sources=apps/backend
sonar.sourceEncoding=UTF-8

# ─────────────────────────────────────────────
#  EXCLUSIONES
#  node_modules: dependencias externas, no nuestro código
#  data/:        archivos JSON de datos en tiempo de ejecución
#  *.test.js:    tests (si se agregan en el futuro)
# ─────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/data/**,\
  **/*.test.js,\
  **/*.spec.js

# ─────────────────────────────────────────────
#  LENGUAJE
# ─────────────────────────────────────────────
sonar.language=js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─────────────────────────────────────────────
#  CONEXIÓN AL SERVIDOR SONARQUBE
#  Puerto 9000 definido en docker-compose.yml
#  El token se genera en la UI de SonarQube:
#  localhost:9000 → My Account → Security → Generate Token
# ─────────────────────────────────────────────
sonar.host.url=http://localhost:9000

# ─────────────────────────────────────────────
#  COBERTURA DE CÓDIGO
#  Sin tests aún, se deja preparado para el futuro
# ─────────────────────────────────────────────
sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/data/**

# ─────────────────────────────────────────────
#  CALIDAD DE CÓDIGO — umbrales relevantes
#  para el análisis del curso
# ─────────────────────────────────────────────
# Duplicación máxima tolerada: 3%
sonar.cpd.exclusions=**/node_modules/**
